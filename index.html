<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkliste</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e1e1e">
<style>
body{margin:0;font-family:Arial;background:#1e1e1e;color:white;display:flex;justify-content:center}
.container{width:100%;max-width:420px;padding:20px}
h1{text-align:center}
input{width:100%;padding:12px;font-size:18px;border-radius:8px;border:none;margin-bottom:15px}
li{list-style:none;background:#2b2b2b;padding:12px;margin-bottom:10px;border-radius:8px;color:#00ff88;font-size:18px}
li.checked{color:#4da6ff;text-decoration:line-through}
</style>
</head>
<body>
<div class="container">
<h1>Meine Liste</h1>
<input id="itemInput" placeholder="Eintrag hinzufügen">
<ul id="list"></ul>
</div>
<script>
let list=JSON.parse(localStorage.getItem("checklist"))||[];
const input=document.getElementById("itemInput");
const ul=document.getElementById("list");
function save(){localStorage.setItem("checklist",JSON.stringify(list));}
function render(){
ul.innerHTML="";
list.forEach((item,i)=>{
const li=document.createElement("li");
if(item.checked)li.classList.add("checked");
li.onclick=()=>{item.checked=!item.checked;save();check();render();};
li.textContent=item.text;
ul.appendChild(li);
});
}
function check(){
if(list.length&&list.every(i=>i.checked)){list=[];save();}
}
input.addEventListener("keypress",e=>{
if(e.key==="Enter"&&input.value.trim()){
list.push({text:input.value,checked:false});
input.value="";save();render();
}});
render();
if("serviceWorker"in navigator){navigator.serviceWorker.register("service-worker.js");}
</script>
</body>
</html>
